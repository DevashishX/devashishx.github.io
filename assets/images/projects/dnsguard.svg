<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">DNSGuard</title>
  <desc id="desc">Project tile image for DNSGuard.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#134e4a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <g fill="#ffffff" opacity="0.18">
    <rect x="870" y="80" width="260" height="180" rx="26"/>
    <rect x="900" y="290" width="230" height="230" rx="30"/>
  </g>
  <text x="90" y="350" fill="#f0fdf4" font-size="108" font-family="Segoe UI, Arial, sans-serif" font-weight="700">DNSGuard</text>
  <text x="90" y="420" fill="#bbf7d0" font-size="38" font-family="Segoe UI, Arial, sans-serif">DNS Filtering and Domain Blocklist Tool</text>
</svg>
