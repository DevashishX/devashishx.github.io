  <text x="90" y="350" fill="#f5f3ff" font-size="110" font-family="Segoe UI, Arial, sans-serif" font-weight="700">DevText</text>
  <text x="90" y="420" fill="#ddd6fe" font-size="38" font-family="Segoe UI, Arial, sans-serif">Terminal Text Editor with Ncurses</text>
